<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zemara Admin</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Inter, system-ui, sans-serif; background: #0e0e2e; color: #e2e0ff; min-height: 100vh; padding: 24px; }
        h1 { font-size: 22px; font-weight: 700; color: #c9a0ff; margin-bottom: 4px; }
        .sub { font-size: 13px; color: #888; margin-bottom: 28px; }
        .login-wrap { max-width: 360px; margin: 80px auto; }
        .login-wrap input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); color: #e2e0ff; font-size: 15px; margin-bottom: 12px; outline: none; }
        .login-wrap input:focus { border-color: #c9a0ff; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 11px 24px; border-radius: 10px; background: #c9a0ff; color: #0e0e2e; font-weight: 700; font-size: 14px; border: none; cursor: pointer; width: 100%; }
        .btn:hover { background: #b880ff; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 20px; }
        .card .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
        .card .value { font-size: 30px; font-weight: 700; color: #c9a0ff; }
        .card .delta { font-size: 12px; color: #6ef; margin-top: 2px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px 14px; color: #888; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,.08); }
        td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.05); }
        tr:hover td { background: rgba(255,255,255,.03); }
        .bar-wrap { display: flex; align-items: center; gap: 8px; }
        .bar { height: 8px; border-radius: 4px; background: linear-gradient(90deg, #c9a0ff, #7b5cff); min-width: 4px; }
        .section-title { font-size: 15px; font-weight: 600; color: #c9a0ff; margin: 28px 0 12px; }
        #error { color: #f88; font-size: 13px; margin-top: 8px; text-align: center; }
        .refresh-btn { float: right; padding: 6px 14px; font-size: 12px; border-radius: 8px; background: rgba(201,160,255,.15); color: #c9a0ff; border: 1px solid rgba(201,160,255,.3); cursor: pointer; }
        .refresh-btn:hover { background: rgba(201,160,255,.25); }
        #loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
        .badge.revenue { background: rgba(110,230,110,.15); color: #6ef26e; }
        .badge.engage { background: rgba(201,160,255,.15); color: #c9a0ff; }
    </style>
</head>
<body>

<!-- Login form (shown initially) -->
<div class="login-wrap" id="login-section">
    <h1>✦ Zemara Admin</h1>
    <p class="sub">Analytics dashboard — sadece yetkili erişim</p>
    <input type="password" id="token-input" placeholder="Admin token" autocomplete="current-password" />
    <button class="btn" onclick="loadDashboard()">Giriş Yap</button>
    <div id="error"></div>
</div>

<!-- Dashboard (hidden until loaded) -->
<div id="dashboard" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <h1>✦ Zemara Admin</h1>
        <button class="refresh-btn" onclick="loadDashboard(true)">↺ Yenile</button>
    </div>
    <p class="sub" id="dash-meta">–</p>

    <div class="grid" id="kpi-grid"></div>

    <div class="section-title">📊 En Fazla Tetiklenen Eventler</div>
    <table><thead><tr><th>Event</th><th>Tür</th><th>Adet</th><th>Dağılım</th></tr></thead>
    <tbody id="events-table"></tbody></table>

    <div class="section-title">📄 En Fazla Görüntülenen Sayfalar</div>
    <table><thead><tr><th>Sayfa</th><th>Görüntülenme</th><th>Dağılım</th></tr></thead>
    <tbody id="pages-table"></tbody></table>
</div>

<div id="loading" style="display:none;">Yükleniyor…</div>

<script>
const REVENUE_EVENTS = ['checkout_started','payment_success','trial_started','vip_checkout','upsell_shown'];
const ENGAGE_EVENTS  = ['share_results','push_permission','referral_incoming','kvkk_accepted'];

let _token = '';

async function loadDashboard(refresh = false) {
    const tokenInput = document.getElementById('token-input');
    if (!refresh) _token = tokenInput?.value?.trim();
    if (!_token) { document.getElementById('error').textContent = 'Token boş olamaz'; return; }

    document.getElementById('login-section').style.display = 'none';
    document.getElementById('dashboard').style.display   = 'none';
    document.getElementById('loading').style.display     = 'block';
    document.getElementById('error').textContent         = '';

    try {
        const res = await fetch(`/api/analytics?token=${encodeURIComponent(_token)}`);
        if (res.status === 403) {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').textContent = 'Yanlış token';
            return;
        }
        const d = await res.json();
        renderDashboard(d);
    } catch(e) {
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').textContent = 'Bağlantı hatası: ' + e.message;
    }
}

function renderDashboard(d) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('dash-meta').textContent =
        `Kaynak: ${d.source || '?'} · Toplam event: ${(d.total || 0).toLocaleString('tr')} · Benzersiz oturum: ${(d.uniqueSessions || 0).toLocaleString('tr')}`;

    // KPI
    const events = d.events || {};
    const kpis = [
        { label: 'Toplam Event', value: (d.total || 0).toLocaleString('tr'), delta: 'tüm zamanlar' },
        { label: 'Benzersiz Oturum', value: (d.uniqueSessions || 0).toLocaleString('tr'), delta: 'tahmini' },
        { label: 'Ödeme Başlandı', value: events['checkout_started'] || 0, delta: 'checkout_started' },
        { label: 'Ödeme Başarılı', value: events['payment_success'] || 0, delta: 'payment_success' },
        { label: 'Trial Başladı', value: events['trial_started'] || 0, delta: 'trial_started' },
        { label: 'Paylaşım', value: events['share_results'] || 0, delta: 'share_results' },
    ];
    document.getElementById('kpi-grid').innerHTML = kpis.map(k =>
        `<div class="card"><div class="label">${k.label}</div><div class="value">${k.value}</div><div class="delta">${k.delta}</div></div>`
    ).join('');

    // Events table
    const sortedEvents = Object.entries(events).sort((a, b) => b[1] - a[1]).slice(0, 30);
    const maxEvent = sortedEvents[0]?.[1] || 1;
    document.getElementById('events-table').innerHTML = sortedEvents.map(([ev, cnt]) => {
        const pct = Math.round(cnt / maxEvent * 100);
        const type = REVENUE_EVENTS.includes(ev)
            ? '<span class="badge revenue">gelir</span>'
            : ENGAGE_EVENTS.includes(ev)
                ? '<span class="badge engage">etkileşim</span>'
                : '';
        return `<tr><td>${ev}</td><td>${type}</td><td><strong>${cnt.toLocaleString('tr')}</strong></td>
            <td><div class="bar-wrap"><div class="bar" style="width:${pct * 1.6}px"></div><span style="font-size:11px;color:#888">${pct}%</span></div></td></tr>`;
    }).join('');

    // Pages table
    const pages = d.pages || {};
    const sortedPages = Object.entries(pages).sort((a, b) => b[1] - a[1]).slice(0, 20);
    const maxPage = sortedPages[0]?.[1] || 1;
    document.getElementById('pages-table').innerHTML = sortedPages.map(([pg, cnt]) => {
        const pct = Math.round(cnt / maxPage * 100);
        return `<tr><td>${pg || '(ana sayfa)'}</td><td><strong>${cnt.toLocaleString('tr')}</strong></td>
            <td><div class="bar-wrap"><div class="bar" style="width:${pct * 1.6}px"></div><span style="font-size:11px;color:#888">${pct}%</span></div></td></tr>`;
    }).join('');
}

// Allow Enter key on token input
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('token-input')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') loadDashboard();
    });
});
</script>
</body>
</html>
