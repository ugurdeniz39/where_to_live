<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07071a"/>
      <stop offset="50%" stop-color="#0e0e2a"/>
      <stop offset="100%" stop-color="#07071a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a0ff"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="rgba(201,160,255,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Stars -->
  <circle cx="150" cy="80" r="1.5" fill="rgba(210,190,255,0.6)"/>
  <circle cx="300" cy="150" r="1" fill="rgba(210,190,255,0.4)"/>
  <circle cx="500" cy="60" r="2" fill="rgba(210,190,255,0.7)"/>
  <circle cx="700" cy="120" r="1.2" fill="rgba(210,190,255,0.5)"/>
  <circle cx="900" cy="80" r="1.8" fill="rgba(210,190,255,0.6)"/>
  <circle cx="1050" cy="180" r="1" fill="rgba(210,190,255,0.4)"/>
  <circle cx="200" cy="500" r="1.3" fill="rgba(210,190,255,0.5)"/>
  <circle cx="1000" cy="500" r="1.5" fill="rgba(210,190,255,0.6)"/>
  <circle cx="800" cy="550" r="1" fill="rgba(210,190,255,0.3)"/>
  <!-- Main star symbol -->
  <text x="600" y="250" text-anchor="middle" font-size="120" fill="url(#accent)" opacity="0.9">✦</text>
  <!-- Title -->
  <text x="600" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="700" fill="white">Zemara</text>
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="rgba(160,156,184,1)">AI Destekli Astrokartografi</text>
  <!-- Tagline -->
  <text x="600" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="rgba(201,160,255,0.8)">Yıldızların Seni Nereye Çağırıyor?</text>
  <!-- Features bar -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="rgba(160,156,184,0.7)">550+ Şehir  •  AI Tarot  •  Kristal Rehberi  •  Rüya Yorumu  •  Burç Uyumu</text>
  <!-- Bottom accent line -->
  <rect x="400" y="580" width="400" height="3" rx="1.5" fill="url(#accent)" opacity="0.5"/>
</svg>
